name: Validate Data & Logic

# Referential-integrity + dependency-free unit gate (REFACTOR §4.1, B.2.1).
# Runs on every push/PR that touches data, scripts, schema, tests, or deps.
# Deliberately installs NO heavy ML stack: check_integrity.py and the Phase 0
# tests are pure-stdlib, so this gate stays fast and never pulls torch.

on:
  push:
    branches: [main]
    paths:
      - 'data/**.json'
      - 'scripts/**.py'
      - 'schema/**.json'
      - 'tests/**.py'
      - 'requirements.txt'
      - '.github/workflows/validate.yml'
  pull_request:
    paths:
      - 'data/**.json'
      - 'scripts/**.py'
      - 'schema/**.json'
      - 'tests/**.py'
      - 'requirements.txt'
      - '.github/workflows/validate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator + test runner (no ML deps required)
        run: python -m pip install --upgrade pip pytest jsonschema

      - name: Validate JSON parses
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path
          bad = []
          for f in sorted(Path("data").glob("*.json")):
              try:
                  json.load(open(f, encoding="utf-8"))
              except Exception as e:
                  bad.append(f"{f}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("All data/*.json parse cleanly.")
          PY

      - name: Validate datasets (schema + referential integrity)
        run: python scripts/validate.py

      - name: Unit tests (dependency-free logic)
        run: python -m pytest tests/ -q
